<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-feature-toggles demo</title>
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
      section { margin: 24px 0; padding: 16px; border: 1px solid #ddd; border-radius: 6px; }
      h2 { margin-top: 0; }
      button { margin: 4px; padding: 6px 12px; cursor: pointer; }
      .flag-row { display: flex; align-items: center; gap: 12px; margin: 6px 0; }
      .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
      .on { background: #d4edda; color: #155724; }
      .off { background: #f8d7da; color: #721c24; }
      .url-hint { font-size: 12px; color: #666; margin-top: 8px; font-family: monospace; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
